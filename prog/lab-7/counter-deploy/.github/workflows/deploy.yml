name: CI & Deploy

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────
  # Этап 1. Тестирование серверной логики.
  # Деплой не начнётся, пока этот job не завершится успешно.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Run tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest -v

  # ─────────────────────────────────────────────────────────────
  # Этап 2. Реальный деплой на сервер (rsync + docker compose).
  # needs: test  ->  если хотя бы один тест упал, деплой не выполняется.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Ensure known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync repository to server
        env:
          RSYNC_RSH: "ssh -o StrictHostKeyChecking=yes"
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/dist' \
            ./ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_PATH }}

      - name: Build & start on server (docker compose)
        run: |
          ssh -o StrictHostKeyChecking=yes \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             export APP_PORT=${{ vars.APP_PORT }} && \
             export COMPOSE_PROJECT_NAME=${{ vars.COMPOSE_PROJECT_NAME }} && \
             docker compose up -d --build"
